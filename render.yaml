services:
  - type: web
    name: truthlens-api
    env: node
    region: oregon
    buildCommand: npm install && npm install --prefix server
    startCommand: npm start --prefix server
    repo: https://github.com/Vkaisang41/truthlens
    branch: master
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
